<style>
:root{
  --navy:#0c3b4f;
  --navy-dark:#082733;
  --teal:#12617a;
  --sand:#e0a45c;
  --sand-dark:#c8873c;
  --sea:#3a93a8;
  --bg:#eef6f8;
  --paper:#ffffff;
  --ink:#123241;
  --muted:#6b8894;
  --wa:#25d366;
  --wa-dark:#1ebe5b;
  --radius:18px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:
    radial-gradient(1200px 600px at 50% -10%, #1c6b86 0%, var(--navy) 55%, var(--navy-dark) 100%);
  min-height:100%;
  display:flex;
  justify-content:center;
  color:var(--ink);
}
#app{
  width:100%;
  max-width:480px;
  min-height:100vh;
  min-height:100dvh;
  background:var(--bg);
  display:flex;
  flex-direction:column;
  position:relative;
  box-shadow:0 0 60px rgba(0,0,0,.35);
}

/* HEADER */
header{
  background:linear-gradient(135deg,var(--navy) 0%,var(--teal) 100%);
  color:#fff;
  padding:14px 16px;
  display:flex;
  align-items:center;
  gap:12px;
  position:sticky;
  top:0;
  z-index:20;
  box-shadow:0 2px 10px rgba(0,0,0,.15);
}
.avatar{
  width:42px;height:42px;border-radius:50%;
  background:linear-gradient(135deg,var(--sand),var(--sand-dark));
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
  box-shadow:inset 0 0 0 2px rgba(255,255,255,.4);
}
.hinfo{flex:1;min-width:0;}
.hinfo .name{font-weight:700;font-size:15.5px;line-height:1.2;}
.hinfo .status{font-size:12px;opacity:.85;display:flex;align-items:center;gap:5px;}
.dot{width:7px;height:7px;border-radius:50%;background:#4ade80;box-shadow:0 0 0 2px rgba(74,222,128,.3);}
.langbar{display:flex;gap:4px;}
.langbtn{
  border:1px solid rgba(255,255,255,.35);
  background:rgba(255,255,255,.08);
  color:#fff;
  font-size:11px;
  font-weight:700;
  padding:5px 7px;
  border-radius:8px;
  cursor:pointer;
  letter-spacing:.3px;
}
.langbtn.active{background:#fff;color:var(--navy);}

/* CHAT */
#chat{
  flex:1;
  overflow-y:auto;
  padding:16px 12px 12px;
  display:flex;
  flex-direction:column;
  gap:10px;
  background:
    linear-gradient(var(--bg),var(--bg));
}
.row{display:flex;width:100%;}
.row.bot{justify-content:flex-start;}
.row.user{justify-content:flex-end;}
.stack{display:flex;flex-direction:column;max-width:88%;}
.row.bot .stack{align-items:flex-start;}
.row.user .stack{align-items:flex-end;}
.bubble{
  max-width:84%;
  padding:10px 13px;
  border-radius:var(--radius);
  font-size:14.5px;
  line-height:1.45;
  white-space:pre-wrap;
  box-shadow:0 1px 2px rgba(0,0,0,.06);
}
.row.bot .bubble{
  background:var(--paper);
  border-bottom-left-radius:4px;
  color:var(--ink);
}
.row.user .bubble{
  background:linear-gradient(135deg,var(--teal),var(--navy));
  color:#fff;
  border-bottom-right-radius:4px;
}
.bubble b{color:var(--navy-dark);}
.row.user .bubble b{color:#fff;}
.bubble .tag{
  display:inline-block;background:var(--bg);color:var(--teal);
  font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px;margin-bottom:4px;
}

.card{
  background:var(--paper);
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 1px 3px rgba(0,0,0,.08);
  border:1px solid #dfe9ec;
}
.card .cardhead{
  background:linear-gradient(135deg,var(--navy),var(--teal));
  color:#fff;padding:9px 12px;
  display:flex;justify-content:space-between;align-items:center;
}
.card .cardhead .cname{font-weight:700;font-size:14.5px;}
.card .cardhead .cprice{font-size:12.5px;background:rgba(255,255,255,.18);padding:2px 8px;border-radius:20px;}
.card .cardbody{padding:10px 12px;font-size:13.5px;color:var(--ink);}
.spec-row{display:flex;flex-wrap:wrap;gap:6px;margin:6px 0;}
.spec{background:var(--bg);color:var(--navy);font-size:11.5px;font-weight:600;padding:3px 8px;border-radius:20px;}
.spec.lic-yes{background:#fde3d3;color:#a6480f;}
.spec.lic-no{background:#d6f3e0;color:#127a3f;}

/* quick replies */
.quick{display:flex;flex-wrap:wrap;gap:7px;margin-top:2px;}
.qbtn{
  background:#fff;
  border:1.5px solid var(--teal);
  color:var(--teal);
  font-size:13px;
  font-weight:600;
  padding:8px 12px;
  border-radius:20px;
  cursor:pointer;
  transition:.15s;
}
.qbtn:hover{background:var(--teal);color:#fff;}
.qbtn.primary{background:var(--sand);border-color:var(--sand-dark);color:#fff;}
.qbtn.primary:hover{background:var(--sand-dark);}
.qbtn.wa{background:var(--wa);border-color:var(--wa-dark);color:#fff;}
.qbtn.wa:hover{background:var(--wa-dark);}

.typing{display:flex;gap:4px;padding:12px 14px;}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--muted);opacity:.5;animation:blink 1.2s infinite;}
.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.3;transform:translateY(0);}40%{opacity:1;transform:translateY(-3px);}}

/* input bar */
#inputbar{
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px 12px calc(10px + env(safe-area-inset-bottom));
  background:var(--paper);
  border-top:1px solid #e1eaed;
  position:sticky;
  bottom:0;
}
#msgInput{
  flex:1;
  border:1.5px solid #dbe6ea;
  background:var(--bg);
  border-radius:22px;
  padding:11px 16px;
  font-size:14.5px;
  outline:none;
  color:var(--ink);
}
#msgInput:focus{border-color:var(--teal);}
#sendBtn{
  width:42px;height:42px;border-radius:50%;border:none;
  background:linear-gradient(135deg,var(--sand),var(--sand-dark));
  color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 6px rgba(200,135,60,.4);
}
#sendBtn:active{transform:scale(.93);}

.footerbadge{
  text-align:center;font-size:10.5px;color:var(--muted);padding:6px 0 2px;
  background:var(--paper);
}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:#c7d7dc;border-radius:3px;}
</style>

const LIC_LABEL_KEY = {none:"licenseNone",captain:"licenseCaptain",optional:"licenseOptional",required:"licenseRequired"};
const LIC_CLASS = {none:"lic-no",captain:"lic-no",optional:"lic-yes",required:"lic-yes"};

/* ================= STATE ================= */
let lang = null;
let booking = null; // {step, date, pax, license, boat, name, contact}
const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('msgInput');

function t(key){ return (S[lang]||S.es)[key]; }
function esc(str){ return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function md(str){
  return esc(str)
    .replace(/\*\*(.+?)\*\*/g,'<b>$1</b>')
    .replace(/\*(.+?)\*/g,'<b>$1</b>')
    .replace(/\n/g,'<br>');
}

function scrollBottom(){ requestAnimationFrame(()=>{ chatEl.scrollTop = chatEl.scrollHeight; }); }

function addUser(text){
  const row = document.createElement('div');
  row.className='row user';
  row.innerHTML = `<div class="bubble">${md(text)}</div>`;
  chatEl.appendChild(row);
  scrollBottom();
}

function showTyping(cb, delay){
  const row = document.createElement('div');
  row.className='row bot';
  row.id='typingRow';
  row.innerHTML = `<div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chatEl.appendChild(row);
  scrollBottom();
  setTimeout(()=>{
    row.remove();
    cb();
  }, delay || 550);
}

function addBot(html, buttons){
  const row = document.createElement('div');
  row.className='row bot';
  let btnHtml = '';
  if(buttons && buttons.length){
    btnHtml = `<div class="quick">${buttons.map(b=>`<button class="qbtn ${b.cls||''}" onclick="${b.onclick}">${esc(b.label)}</button>`).join('')}</div>`;
  }
  row.innerHTML = `<div class="stack"><div class="bubble">${html}</div>${btnHtml ? `<div style="margin-top:6px">${btnHtml}</div>` : ''}</div>`;
  chatEl.appendChild(row);
  scrollBottom();
}

function addBotText(text, buttons, delay){
  showTyping(()=>addBot(md(text), buttons), delay);
}

/* ================= BOOKING FLOW ================= */
function startBooking(preselectBoatId){
  addUser(t('menu')[2]);
  booking = {step:'date', date:null, pax:null, license:null, boat: preselectBoatId ? BOATS.find(b=>b.id===preselectBoatId) : null, name:null, contact:null};
  addBotText(t('bookStart'), null, 300);
  setTimeout(()=>{ addBotText(t('askDate')); }, 700);
}

function bookingHandleText(text){
  if(!booking) return false;
  if(booking.step==='date'){
    booking.date = text;
    addBotText(t('askPax'), t('paxOpts').map(l=>({label:l, onclick:`bookingPax('${l}')`})), 450);
    booking.step='pax';
    return true;
  }
  if(booking.step==='name'){
    booking.name = text;
    addBotText(t('askContact').replace('{name}', text), null, 400);
    booking.step='contact';
    return true;
  }
  if(booking.step==='contact'){
    booking.contact = text;
    finishBooking();
    return true;
  }
  return false;
}

function bookingPax(label){
  addUser(label);
  booking.pax = label;
  if(booking.boat){
    booking.license = 'preset';
    afterLicenseKnown();
  } else {
    addBotText(t('askLicense'), t('licenseOpts').map(l=>({label:l, onclick:`bookingLicense('${l}')`})), 450);
    booking.step='license';
  }
}

function bookingLicense(label){
  addUser(label);
  booking.license = label;
  afterLicenseKnown();
}

function suggestBoatFor(booking){
  const maxPax = booking.pax && booking.pax.includes('12+') ? 12 : booking.pax && booking.pax.includes('Más') ? 13 : booking.pax && booking.pax.includes('Plus') ? 13 : parseInt((booking.pax||'').match(/\d+/g)?.slice(-1)[0]) || 4;
  const noLic = booking.license && /no|non|not/i.test(booking.license) && !/sí|oui|yes/i.test(booking.license);
  let candidates = BOATS.filter(b=>b.pax>=Math.min(maxPax,12));
  if(candidates.length===0) candidates = [BOATS[BOATS.length-1]];
  candidates.sort((a,b)=>a.pax-b.pax);
  return candidates[0];
}

function afterLicenseKnown(){
  if(!booking.boat){
    const suggestion = suggestBoatFor(booking);
    showTyping(()=>{
      addBot(md(t('suggestBoat')));
      const row = document.createElement('div');
      row.className='row bot';
      row.innerHTML = `<div class="bubble" style="padding:0;background:transparent;box-shadow:none;max-width:92%">${boatCardHtml(suggestion)}</div>`;
      chatEl.appendChild(row);
      scrollBottom();

        {label:t('otherBoat'), onclick:"showBoatsForBooking()"}
      ]);
    }, 500);
  } else {
    askNameStep();
  }
}

/* ================= LANGUAGE ================= */
function normalize(s){ return s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,''); }

function detectLang(text){
  const n = normalize(text);
  const fr = ['bonjour','salut','bateau','reserver','reservation','prix','combien','merci','oui','non','permis','svp','bonsoir'];
  const en = ['hello','hi ','hey','boat','book','price','how much','thanks','yes','no ','license','please'];
  const es = ['hola','buenas','barco','reservar','precio','cuanto','gracias','si','no ','licencia','favor'];
  const ca = ['hola','bona tarda','barca','vaixell','reservar','preu','quant','gracies','llicencia','sisplau','sisplau','voldria','quantes'];
  let scores = {fr:0,en:0,es:0,ca:0};
  fr.forEach(w=>{ if(n.includes(w)) scores.fr++; });
  en.forEach(w=>{ if(n.includes(w)) scores.en++; });
  es.forEach(w=>{ if(n.includes(w)) scores.es++; });
  ca.forEach(w=>{ if(n.includes(w)) scores.ca++; });
  const best = Object.entries(scores).sort((a,b)=>b[1]-a[1])[0];
  return best[1]>0 ? best[0] : null;
}

function forceLang(l){
  lang = l;
  document.querySelectorAll('.langbtn').forEach(b=>b.classList.toggle('active', b.dataset.lang===l));
  document.getElementById('statusTxt').textContent = t('status');
  inputEl.placeholder = t('placeholder');
  chatEl.innerHTML = '';
  booking = null;
  addBotText(t('welcome'), mainMenuButtons(), 250);
}

/* ================= FREE TEXT HANDLING ================= */
function normalizedIncludesAny(n, arr){ return arr.some(w=>n.includes(w)); }

function handleFreeText(raw){
  const text = raw.trim();
  if(!text) return;
  addUser(text);
  inputEl.value='';

  // language auto-switch if very confident and different from current on first real message
  const detected = detectLang(text);

  if(booking && (booking.step==='date'||booking.step==='name'||booking.step==='contact')){
    bookingHandleText(text);
    return;
  }

  const n = normalize(text);

  // boat name match
  const boatMatch = BOATS.find(b=>b.key.some(k=>n.includes(normalize(k))));
  if(boatMatch){ showTyping(()=>showBoatDetailInline(boatMatch), 350); return; }

  if(normalizedIncludesAny(n,['barco','barcos','bateau','bateaux','boat','boats','flota','flotte','fleet'])){ showBoats(); return; }
  if(normalizedIncludesAny(n,['precio','precios','tarif','prix','price','prices','cuanto cuesta','coste','cout'])){ showPrices(); return; }
  if(normalizedIncludesAny(n,['reserv','book','réserv'])){ startBooking(); return; }
  if(normalizedIncludesAny(n,['licencia','licence','permis','license','titulacion'])){
    addBotText(t('licenseIntro'), mainMenuButtons(), 400); return;
  }
  if(normalizedIncludesAny(n,['cala','crique','cove','cap de creus'])){ showFaqItem('calas'); return; }
  if(normalizedIncludesAny(n,['combustible','fuel','carburant','essence','gasolina'])){ showFaqItem('fuel'); return; }
  if(normalizedIncludesAny(n,['cancel','annul'])){ showFaqItem('cancel'); return; }
  if(normalizedIncludesAny(n,['tiempo','meteo','weather','lluvia','pluie','rain'])){ showFaqItem('weather'); return; }
  if(normalizedIncludesAny(n,['whatsapp','humano','human','equipo','equipe','llamar','appeler','call'])){ humanHandoff(); return; }
  if(normalizedIncludesAny(n,['hola','buenas','bonjour','salut','hello','hi','hey','bonsoir'])){
    addBotText(t('welcome'), mainMenuButtons(), 400); return;
  }

  addBotText(t('fallback'), mainMenuButtons(), 450);
}

function showBoatDetailInline(b){
  const row = document.createElement('div');

  row.innerHTML = `<div class="bubble" style="padding:0;background:transparent;box-shadow:none;max-width:92%">${boatCardHtml(b)}</div>`;
  chatEl.appendChild(row);
  scrollBottom();
  addBot(md(t('askBoatConfirm')), [
    {label:t('confirmBoat'), onclick:`startBooking('${b.id}')`, cls:'primary'},
    {label:t('otherBoat'), onclick:"showBoats()"}
  ]);
}

function handleSend(){
  const val = inputEl.value;
  if(!val.trim()) return;
  if(!lang){
    const d = detectLang(val) || 'ca';
    forceLangSilent(d);
  }
  handleFreeText(val);
}

function forceLangSilent(l){
  lang = l;
  document.querySelectorAll('.langbtn').forEach(b=>b.classList.toggle('active', b.dataset.lang===l));
  document.getElementById('statusTxt').textContent = t('status');
  inputEl.placeholder = t('placeholder');
}

inputEl.addEventListener('keydown', e=>{ if(e.key==='Enter') handleSend(); });

/* ================= INIT ================= */
function init(){
  lang = 'ca';
  document.querySelector('.langbtn[data-lang="ca"]').classList.add('active');
  addBotText(t('welcome'), mainMenuButtons(), 200);
}
init();
</script>
</body>
</html>
